<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU 3rd Sem SGPA Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --vtu-blue: #283593; }
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 650px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--vtu-blue); margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .label { flex: 2; font-size: 14px; color: #333; }
        .input-group { display: flex; gap: 10px; align-items: center; }
        input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; }
        .credit-tag { background: #e8eaf6; padding: 8px 12px; border-radius: 5px; font-weight: bold; width: 30px; text-align: center; }
        .btn { width: 100%; padding: 15px; background: var(--vtu-blue); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #result-area { margin-top: 20px; padding: 20px; text-align: center; border-radius: 10px; background: #f1f8e9; display: none; }
        #sgpa-text { font-size: 40px; font-weight: bold; color: #2e7d32; display: block; }
        .pdf-box { margin-top: 30px; border: 2px dashed #999; padding: 20px; text-align: center; border-radius: 10px; background: #fffde7; }
    </style>
</head>
<body>

<div class="card">
    <h2>VTU SGPA (2022 Scheme)</h2>
    
    <div id="subjects">
        <div class="row"><span class="label">Maths (BCS301)</span><div class="input-group"><input type="number" class="m-val" data-c="4" data-id="BCS301" placeholder="0"><div class="credit-tag">4</div></div></div>
        <div class="row"><span class="label">DDCO (BCS302)</span><div class="input-group"><input type="number" class="m-val" data-c="4" data-id="BCS302" placeholder="0"><div class="credit-tag">4</div></div></div>
        <div class="row"><span class="label">OS (BCS303)</span><div class="input-group"><input type="number" class="m-val" data-c="4" data-id="BCS303" placeholder="0"><div class="credit-tag">4</div></div></div>
        <div class="row"><span class="label">Data Structures (BCS304)</span><div class="input-group"><input type="number" class="m-val" data-c="3" data-id="BCS304" placeholder="0"><div class="credit-tag">3</div></div></div>
        <div class="row"><span class="label">DS Lab (BCSL305)</span><div class="input-group"><input type="number" class="m-val" data-c="1" data-id="BCSL305" placeholder="0"><div class="credit-tag">1</div></div></div>
        <div class="row"><span class="label">Java (BCS306A)</span><div class="input-group"><input type="number" class="m-val" data-c="3" data-id="BCS306A" placeholder="0"><div class="credit-tag">3</div></div></div>
        <div class="row"><span class="label">Social Connect (BSCK307)</span><div class="input-group"><input type="number" class="m-val" data-c="1" data-id="BSCK307" placeholder="0"><div class="credit-tag">1</div></div></div>
        <div class="row"><span class="label">Git/Project (BCS358C)</span><div class="input-group"><input type="number" class="m-val" data-c="1" data-id="BCS358C" placeholder="0"><div class="credit-tag">1</div></div></div>
        <div class="row"><span class="label">Physical Ed (BPEK359)</span><div class="input-group"><input type="number" class="m-val" data-c="1" data-id="BPEK359" placeholder="0"><div class="credit-tag">1</div></div></div>
    </div>

    <button class="btn" onclick="runCalculation()">Calculate SGPA</button>

    <div id="result-area">
        <strong>YOUR SGPA</strong>
        <span id="sgpa-text">0.00</span>
        <span id="status-tag">Status: PASS ✅</span>
    </div>

    <div class="pdf-box">
        <strong>PDF Result Upload</strong><br>
        <input type="file" id="fileInput" accept="application/pdf" style="margin-top:10px;">
    </div>
</div>

<script>
    // 1. Formula Logic
    function getPoints(m) {
        if (m >= 90) return 10;
        if (m >= 80) return 9;
        if (m >= 70) return 8;
        if (m >= 60) return 7;
        if (m >= 45) return 6;
        if (m >= 40) return 4;
        return 0;
    }

    // 2. Main Calculation Function
    function runCalculation() {
        const inputs = document.querySelectorAll('.m-val');
        let totalWeightedPoints = 0;
        let totalCredits = 0;

        inputs.forEach(box => {
            const marks = parseFloat(box.value) || 0;
            const credits = parseFloat(box.getAttribute('data-c'));
            
            const gradePoints = getPoints(marks);
            totalWeightedPoints += (gradePoints * credits);
            totalCredits += credits;
        });

        const finalSGPA = totalWeightedPoints / totalCredits;
        
        // Show Results
        const resultDiv = document.getElementById('result-area');
        resultDiv.style.display = 'block';
        document.getElementById('sgpa-text').innerText = finalSGPA.toFixed(2);
        
        document.getElementById('status-tag').innerText = finalSGPA >= 4 ? "Status: PASS ✅" : "Status: FAIL ❌";
        
        console.log("Calculation Done: ", finalSGPA);
    }

    // 3. PDF Logic
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ");
            }
            document.querySelectorAll('.m-val').forEach(input => {
                const id = input.getAttribute('data-id');
                const reg = new RegExp(id + "\\s+(\\d+)", "i");
                const match = text.match(reg);
                if(match) input.value = match[1];
            });
            runCalculation();
        };
        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
