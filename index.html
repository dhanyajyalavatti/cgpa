<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU 3rd Sem SGPA Calculator</title>
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 25px; }
        
        .header-row { display: grid; grid-template-columns: 3fr 1.5fr 1fr; gap: 10px; padding: 10px; font-weight: bold; border-bottom: 2px solid var(--primary); }
        .subject-row { display: grid; grid-template-columns: 3fr 1.5fr 1fr; gap: 10px; padding: 12px 10px; border-bottom: 1px solid #eee; align-items: center; }
        
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #f8f9ff; }
        
        .credit-badge { background: #e8eaf6; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; text-align: center; }
        
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 25px; font-size: 18px; font-weight: bold; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        
        #result-box { margin-top: 25px; padding: 20px; text-align: center; border-radius: 10px; background: #e8f5e9; display: none; border: 1px solid #c8e6c9; }
        #sgpa-output { font-size: 42px; color: var(--secondary); font-weight: bold; display: block; margin-top: 5px; }
        .grade-text { font-size: 1.1em; color: #444; }
    </style>
</head>
<body>

<div class="card">
    <h2>VTU SGPA Calculator</h2>
    <p class="subtitle">2022 Scheme - Semester 3</p>
    
    <div class="header-row">
        <span>Subject</span>
        <span>Marks</span>
        <span>Credits</span>
    </div>

    <div id="calculator">
        <div class="subject-row"><span>Maths (BCS301)</span> <input type="number" class="m-val" data-c="3" placeholder="0-100"> <span class="credit-badge">3</span></div>
        <div class="subject-row"><span>DDCO (BCS302)</span> <input type="number" class="m-val" data-c="4" placeholder="0-100"> <span class="credit-badge">4</span></div>
        <div class="subject-row"><span>OS (BCS303)</span> <input type="number" class="m-val" data-c="3" placeholder="0-100"> <span class="credit-badge">3</span></div>
        <div class="subject-row"><span>Data Struct (BCS304)</span> <input type="number" class="m-val" data-c="3" placeholder="0-100"> <span class="credit-badge">3</span></div>
        <div class="subject-row"><span>DS Lab (BCSL305)</span> <input type="number" class="m-val" data-c="1" placeholder="0-100"> <span class="credit-badge">1</span></div>
        <div class="subject-row"><span>Java (BCS306A)</span> <input type="number" class="m-val" data-c="3" placeholder="0-100"> <span class="credit-badge">3</span></div>
        <div class="subject-row"><span>SCR (BSCK307)</span> <input type="number" class="m-val" data-c="1" placeholder="0-100"> <span class="credit-badge">1</span></div>
        <div class="subject-row"><span>Git (BCS358C)</span> <input type="number" class="m-val" data-c="1" placeholder="0-100"> <span class="credit-badge">1</span></div>
        <div class="subject-row"><span>Phys Ed (BPEK359)</span> <input type="number" class="m-val" data-c="1" placeholder="0-100"> <span class="credit-badge">1</span></div>
    </div>

    <button class="btn" onclick="calculate()">Calculate SGPA</button>

    <div id="result-box">
        <span class="grade-text">Your Semester SGPA is:</span>
        <span id="sgpa-output">0.00</span>
    </div>
</div>

<script>
    /**
     * VTU 2022 Scheme Grading Logic
     * Marks Range -> Grade Point
     */
    function getGradePoint(marks) {
        if (marks >= 90) return 10; // O
        if (marks >= 80) return 9;  // A+
        if (marks >= 70) return 8;  // A
        if (marks >= 60) return 7;  // B+
        if (marks >= 55) return 6;  // B
        if (marks >= 50) return 5;  // C
        if (marks >= 40) return 4;  // P
        return 0;                   // F
    }

    function calculate() {
        const inputs = document.querySelectorAll('.m-val');
        let totalWeightedGP = 0;
        let totalCredits = 0;
        let hasError = false;

        inputs.forEach(input => {
            const marks = parseFloat(input.value);
            const credits = parseFloat(input.dataset.c);

            // Validation: Treat empty as 0, but check for range
            if (!isNaN(marks)) {
                if (marks < 0 || marks > 100) {
                    alert("Please enter marks between 0 and 100");
                    input.focus();
                    hasError = true;
                    return;
                }
                totalWeightedGP += (getGradePoint(marks) * credits);
            }
            totalCredits += credits;
        });

        if (hasError) return;

        const sgpa = totalWeightedGP / totalCredits;
        
        const resultBox = document.getElementById('result-box');
        const output = document.getElementById('sgpa-output');
        
        resultBox.style.display = 'block';
        output.innerText = sgpa.toFixed(2);
        
        // Smooth scroll to result
        resultBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
