    <button class="btn" onclick="calculate()">Calculate SGPA</button>

<script>
    // VTU Grading Logic
    function getGP(m) {
        if (m >= 90) return 10;
        if (m >= 80) return 9;
        if (m >= 70) return 8;
        if (m >= 60) return 7;
        if (m >= 45) return 6;
        if (m >= 40) return 4;
        return 0;
    }

    function calculate() {
        const inputs = document.querySelectorAll('.m-val');
        let totalWeighted = 0, totalCredits = 0;

        inputs.forEach(i => {
            const marks = parseFloat(i.value) || 0;
            const credits = parseFloat(i.dataset.c);
            totalWeighted += (getGP(marks) * credits);
            totalCredits += credits;
        });

        const sgpa = totalWeighted / totalCredits;
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('sgpa-output').innerText = sgpa.toFixed(2);
    }
