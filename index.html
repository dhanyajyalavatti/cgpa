<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU SGPA Calculator & PDF Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --vtu-blue: #1a2a6c; --vtu-accent: #f2a900; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 700px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--vtu-blue); }
        h1 { color: var(--vtu-blue); text-align: center; font-size: 24px; }
        .subject-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 8px; background: #fafafa; border-radius: 5px; }
        input[type="number"] { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { display: block; width: 100%; padding: 12px; background: var(--vtu-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn:hover { background: #253b91; }
        .pdf-box { border: 2px dashed #bbb; padding: 20px; text-align: center; margin-top: 20px; background: #fffdf0; border-radius: 8px; }
        #result { font-size: 28px; text-align: center; margin-top: 20px; color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>VTU 2022 Scheme - 3rd Sem</h1>
    
    <div id="subject-inputs">
        <div class="subject-row"><span>Maths (BCS301) [4]</span> <input type="number" class="mark" data-code="BCS301" data-credit="4" placeholder="0"></div>
        <div class="subject-row"><span>DDCO (BCS302) [4]</span> <input type="number" class="mark" data-code="BCS302" data-credit="4" placeholder="0"></div>
        <div class="subject-row"><span>OS (BCS303) [4]</span> <input type="number" class="mark" data-code="BCS303" data-credit="4" placeholder="0"></div>
        <div class="subject-row"><span>DS (BCS304) [3]</span> <input type="number" class="mark" data-code="BCS304" data-credit="3" placeholder="0"></div>
        <div class="subject-row"><span>DS Lab (BCSL305) [1]</span> <input type="number" class="mark" data-code="BCSL305" data-credit="1" placeholder="0"></div>
        <div class="subject-row"><span>Java (BCS306A) [3]</span> <input type="number" class="mark" data-code="BCS306A" data-credit="3" placeholder="0"></div>
        <div class="subject-row"><span>SCR (BSCK307) [1]</span> <input type="number" class="mark" data-code="BSCK307" data-credit="1" placeholder="0"></div>
        <div class="subject-row"><span>Git Project (BCS358C) [1]</span> <input type="number" class="mark" data-code="BCS358C" data-credit="1" placeholder="0"></div>
        <div class="subject-row"><span>PE (BPEK359) [1]</span> <input type="number" class="mark" data-code="BPEK359" data-credit="1" placeholder="0"></div>
    </div>

    <button class="btn" onclick="manualCalculate()">Calculate SGPA</button>
    <div id="result">SGPA: 0.00</div>

    <div class="pdf-box">
        <strong>Upload VTU Result PDF</strong><br><br>
        <input type="file" id="pdfUpload" accept="application/pdf">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Experimental: Scans for 2022 Scheme codes.</p>
    </div>
</div>

<script>
    // Configure PDF.js Worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // 1. VTU Grading Logic
    function getGP(marks) {
        if (marks >= 90) return 10;
        if (marks >= 80) return 9;
        if (marks >= 70) return 8;
        if (marks >= 60) return 7;
        if (marks >= 45) return 6;
        if (marks >= 40) return 4;
        return 0;
    }

    // 2. Manual Calculation
    function manualCalculate() {
        let rows = document.querySelectorAll('.mark');
        let totalPoints = 0;
        let totalCredits = 0;

        rows.forEach(row => {
            let mark = parseInt(row.value) || 0;
            let credit = parseInt(row.getAttribute('data-credit'));
            totalPoints += (getGP(mark) * credit);
            totalCredits += credit;
        });

        let sgpa = totalPoints / totalCredits;
        document.getElementById('result').innerText = "SGPA: " + sgpa.toFixed(2);
    }

    // 3. PDF Parsing Logic
    document.getElementById('pdfUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ");
            }

            console.log("PDF Scanned text:", fullText); // For debugging
            fillMarks(fullText);
        };
        reader.readAsArrayBuffer(file);
    });

    function fillMarks(text) {
        let inputs = document.querySelectorAll('.mark');
        inputs.forEach(input => {
            let code = input.getAttribute('data-code');
            // This regex looks for the code (like BCS301) and picks the next number after it
            let regex = new RegExp(code + "\\s+(\\d+)", "i");
            let match = text.match(regex);
            if (match) {
                input.value = match[1];
            }
        });
        manualCalculate(); // Recalculate once filled
        alert("Scan complete! Marks filled from PDF.");
    }
</script>

</body>
</html>
